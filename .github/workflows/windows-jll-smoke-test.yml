name: windows-jll-smoke-test

on:
  workflow_dispatch:
    inputs:
      gametracer_repo:
        description: "Repo to test against (owner/name)"
        required: true
        default: "mnshkw/GameTracer.jl"
        type: string
      gametracer_ref:
        description: "Branch, tag, or commit SHA to test"
        required: true
        default: "main"
        type: string
      julia_version:
        description: "Julia version for the Windows job"
        required: true
        default: "1.10"
        type: string

permissions:
  contents: read

env:
  BB_ENV: ${{ github.workspace }}/.bb-env
  BUILD_DEPOT: ${{ github.workspace }}/.julia-build

jobs:
  build_windows_tarball:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scratch repo
        uses: actions/checkout@v5

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Show Docker version
        run: docker version

      - name: Install BinaryBuilder into persistent env
        shell: bash
        run: |
          mkdir -p "$BB_ENV" "$BUILD_DEPOT"
          JULIA_DEPOT_PATH="$BUILD_DEPOT" julia --project="$BB_ENV" -e 'using Pkg; Pkg.add("BinaryBuilder")'

      - name: Build x86_64-w64-mingw32 tarball and local JLL
        shell: bash
        working-directory: builder
        run: |
          JULIA_DEPOT_PATH="$BUILD_DEPOT" julia --project="$BB_ENV" --color=yes build_tarballs.jl --verbose --deploy=local x86_64-w64-mingw32

      - name: List generated products
        shell: bash
        working-directory: builder
        run: ls -lah products

      - name: Archive generated local JLL package
        shell: bash
        run: |
          test -d "$BUILD_DEPOT/dev/gametracer_jll"
          tar -C "$BUILD_DEPOT/dev" -czf "$GITHUB_WORKSPACE/gametracer_jll_pkg.tar.gz" gametracer_jll

      - name: Inspect DLL imports
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-mingw-w64-x86-64
          rm -rf /tmp/gametracer-prefix
          mkdir -p /tmp/gametracer-prefix
          tar -xzf builder/products/*x86_64-w64-mingw32*.tar.gz -C /tmp/gametracer-prefix
          x86_64-w64-mingw32-objdump -p /tmp/gametracer-prefix/bin/libgametracer.dll | grep 'DLL Name' || true

      - name: Upload Windows tarball
        uses: actions/upload-artifact@v4
        with:
          name: gametracer-windows-tarball
          path: builder/products/*x86_64-w64-mingw32*.tar.gz
          retention-days: 3

      - name: Upload local JLL package
        uses: actions/upload-artifact@v4
        with:
          name: gametracer-local-jll
          path: gametracer_jll_pkg.tar.gz
          retention-days: 3

  test_on_windows:
    needs: build_windows_tarball
    runs-on: windows-latest
    steps:
      - name: Check out GameTracer.jl
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.gametracer_repo }}
          ref: ${{ inputs.gametracer_ref }}
          path: GameTracer.jl

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ inputs.julia_version }}

      - name: Create isolated Julia depot
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\.julia" | Out-Null
          "JULIA_DEPOT_PATH=$env:GITHUB_WORKSPACE\.julia;" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download patched tarball
        uses: actions/download-artifact@v5
        with:
          name: gametracer-windows-tarball
          path: artifacts

      - name: Download local JLL package
        uses: actions/download-artifact@v5
        with:
          name: gametracer-local-jll
          path: artifacts-jll

      - name: Unpack local JLL package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\localdev" | Out-Null
          $jllArchive = Get-ChildItem "$env:GITHUB_WORKSPACE\artifacts-jll\*.tar.gz" | Select-Object -First 1
          if (-not $jllArchive) { throw "No JLL archive found." }
          tar -xzf $jllArchive.FullName -C "$env:GITHUB_WORKSPACE\localdev"

      - name: Put rebuilt binaries into local JLL override/
        shell: pwsh
        run: |
          $jllDir = Join-Path $env:GITHUB_WORKSPACE "localdev\gametracer_jll"
          $overrideDir = Join-Path $jllDir "override"
          New-Item -ItemType Directory -Force -Path $overrideDir | Out-Null
          $tarball = Get-ChildItem "$env:GITHUB_WORKSPACE\artifacts\*.tar.gz" | Select-Object -First 1
          if (-not $tarball) { throw "No tarball found." }
          tar -xzf $tarball.FullName -C $overrideDir
          Get-ChildItem -Recurse $overrideDir | Select-Object FullName

      - name: Develop local gametracer_jll into GameTracer environment
        working-directory: GameTracer.jl
        run: |
          julia --project=. -e 'using Pkg; Pkg.develop(path=joinpath(ENV["GITHUB_WORKSPACE"], "localdev", "gametracer_jll")); Pkg.resolve(); Pkg.instantiate()'

      - name: Smoke test local JLL load
        working-directory: GameTracer.jl
        run: |
          julia --project=. -e 'using gametracer_jll; println("using gametracer_jll ok"); println(gametracer_jll.libgametracer)'

      - name: Smoke test package load
        working-directory: GameTracer.jl
        run: |
          julia --project=. -e 'using GameTracer; println("using GameTracer ok")'

      - name: Run GameTracer.jl tests
        working-directory: GameTracer.jl
        run: |
          julia --project=. -e 'using Pkg; Pkg.test()'
